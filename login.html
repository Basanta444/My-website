<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Basanta's App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('4.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Glassmorphism Effect */
        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            color: white;
            text-align: center;
        }

        .login-card h2 {
            margin-top: 0;
            font-size: 32px;
            font-weight: 600;
        }

        .btn-google {
            background: white;
            color: #333;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .btn-google:hover { background: #f1f2f6; }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: rgba(255, 255, 255, 0.7);
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            margin: 0 10px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            font-family: inherit;
        }

        .forgot-link {
            display: block;
            text-align: right;
            color: white;
            font-size: 12px;
            text-decoration: none;
            margin-bottom: 20px;
        }
        .forgot-link:hover { text-decoration: underline; }

        .btn-submit {
            background: #1e90ff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #187bcd; }

        .signup-link { margin-top: 20px; font-size: 14px; }
        .signup-link a { color: #1e90ff; text-decoration: none; font-weight: 600; }
        .signup-link a:hover { text-decoration: underline; }

        .terms { font-size: 11px; margin-top: 20px; color: rgba(255, 255, 255, 0.6); }
        .terms span { color: white; cursor: pointer; text-decoration: underline; }

        .back-home {
            position: absolute;
            top: 20px; left: 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">← Back to Home</a>

    <div class="login-card">
        <h2>Welcome Back</h2>
        <button class="btn-google">🔍 Sign in with Google</button>
        
        <div class="divider">or</div>
        
        <form onsubmit="event.preventDefault(); alert('Login successful! (Frontend Demo)'); window.location.href='index.html';">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="you@gmail.com" required>
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter Password" required>
            </div>
            
            <a href="#" class="forgot-link">Forgot password?</a>
            
            <button type="submit" class="btn-submit">Log In</button>
        </form>

        <div class="signup-link">
            Don't have an account? <a href="sign.html">Sign up</a>
        </div>
        
        <p class="terms">By clicking "Log in" you are agreeing to our <span>terms of service</span> and <span>privacy policy</span>.</p>
    </div>

</body>
</html>
