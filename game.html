<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tic-Tac-Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            color: #333;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 40px;
            margin: 0 0 10px 0;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        #turn-indicator {
            font-size: 20px;
            font-weight: 600;
            background: white;
            padding: 5px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #board {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            grid-gap: 10px;
            background: rgba(255, 255, 255, 0.4);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        .cell {
            width: 110px;
            height: 110px;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s ease-in-out;
        }

        .cell:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
        
        .cell.x { color: #ff4757; } /* Red for X */
        .cell.o { color: #1e90ff; } /* Blue for O */

        #result-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .modal-content {
            background: white;
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #result-screen h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #2f3542;
        }

        #new-game-btn {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            transition: 0.3s;
        }

        #new-game-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6);
        }

        .back-btn {
            margin-top: 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Tic-Tac-Toe</h1>
    <div id="turn-indicator">Player X's Turn</div>
</div>

<div id="board"></div>

<a href="about.html" class="back-btn">← Back to Website</a>

<div id="result-screen">
    <div class="modal-content">
        <h2 id="result-message"></h2>
        <button id="new-game-btn" onclick="startNewGame()">Play Again</button>
    </div>
</div>

<script>
    const board = document.getElementById('board');
    const resultScreen = document.getElementById('result-screen');
    const resultMessage = document.getElementById('result-message');
    const turnIndicator = document.getElementById('turn-indicator');
    let currentPlayer = 'X';
    let gameBoard = ['', '', '', '', '', '', '', '', ''];
    let gameActive = true;

    function checkWinner() {
        const winningCombinations = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];
        for (const combo of winningCombinations) {
            const [a, b, c] = combo;
            if (gameBoard[a] && gameBoard[a] === gameBoard[b] && gameBoard[a] === gameBoard[c]) {
                return true;
            }
        }
        return false;
    }

    function checkTie() {
        return !gameBoard.includes('');
    }

    function handleClick(index) {
        if (gameBoard[index] === '' && gameActive) {
            gameBoard[index] = currentPlayer;
            renderBoard();
            
            if (checkWinner()) {
                gameActive = false;
                displayResult(`Player ${currentPlayer} Wins! 🎉`);
            } else if (checkTie()) {
                gameActive = false;
                displayResult('It\'s a Draw! 🤝');
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                turnIndicator.textContent = `Player ${currentPlayer}'s Turn`;
                // Colorize indicator based on player
                turnIndicator.style.color = currentPlayer === 'X' ? '#ff4757' : '#1e90ff';
            }
        }
    }

    function renderBoard() {
        board.innerHTML = '';
        gameBoard.forEach((value, index) => {
            const cell = document.createElement('div');
            cell.className = `cell ${value.toLowerCase()}`;
            cell.textContent = value;
            cell.addEventListener('click', () => handleClick(index));
            board.appendChild(cell);
        });
    }

    function displayResult(message) {
        setTimeout(() => {
            resultMessage.textContent = message;
            resultScreen.style.display = 'flex';
        }, 300); // Slight delay so player can see the winning move
    }

    function startNewGame() {
        gameBoard = ['', '', '', '', '', '', '', '', ''];
        currentPlayer = 'X';
        gameActive = true;
        turnIndicator.textContent = `Player X's Turn`;
        turnIndicator.style.color = '#ff4757';
        resultScreen.style.display = 'none';
        renderBoard();
    }

    renderBoard();
</script>

</body>
</html>
